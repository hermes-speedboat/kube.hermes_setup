[defaults]
inventory = ./inventory/hosts.ini
roles_path = ./roles:/opt/data/ansible/roles
collections_path = ./collections:/opt/data/ansible/collections
local_tmp = /opt/data/ansible/tmp
remote_tmp = /tmp/.ansible-${USER}
host_key_checking = True
retry_files_enabled = False
stdout_callback = default
interpreter_python = auto_silent

[ssh_connection]
ssh_args = -F /opt/data/.ssh/config -o ControlMaster=auto -o ControlPersist=60s
control_path_dir = /opt/data/ansible/cp
pipelining = True
